spring.application.name=mcpclient

logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
spring.ai.openai.api-key=${OPENAI_API_KEY}
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:C:\\Users\\gunji\\OneDrive\\Desktop\\chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=ashok
spring.datasource.password=12345
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.ai.chat.memory.repository.jdbc.initialize-schema=always


spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json
